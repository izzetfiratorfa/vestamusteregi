<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vesta Müştereği</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#FAFAF8;--bg2:#F2F1ED;--text:#1A1A18;--text2:#7A7A74;--text3:#ABABAB;
--border:#E8E7E3;--accent:#C8956C;--accent2:#B07D56;--black:#0A0A0A;
--card:#FFFFFF;--radius:12px;--font:'DM Sans',system-ui,-apple-system,sans-serif;
--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--black);color:var(--text);-webkit-font-smoothing:antialiased}
#app{height:100%;width:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
input,button,textarea,select{font-family:var(--font);outline:none;border:none}

/* ---- Screens ---- */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease;transform:translateX(16px)}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0)}

/* ---- Auth ---- */
.auth{background:var(--black);align-items:center;justify-content:center;padding:40px 32px}
.auth-logo{width:64px;height:64px;object-fit:contain;margin-bottom:14px}
.auth h1{font-size:22px;font-weight:500;color:#FAF3E8;letter-spacing:5px}
.auth p.sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-top:5px}
.auth-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;margin-top:32px}
.ai{width:100%;background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 18px;color:#FAF3E8;font-size:14px;letter-spacing:1px;text-align:center;transition:border-color .3s}
.ai:focus{border-color:rgba(200,149,108,.5)}
.ai::placeholder{color:rgba(255,255,255,.25)}
.ai.code{letter-spacing:4px;font-size:16px}
.ab{width:100%;background:var(--accent);color:var(--black);border-radius:10px;padding:14px;font-size:13px;font-weight:500;letter-spacing:1px;cursor:pointer;transition:background .2s,transform .1s}
.ab:active{transform:scale(.98);background:var(--accent2)}
.ab:disabled{opacity:.5;cursor:default;transform:none}
.ag{width:100%;background:transparent;border:.5px solid rgba(255,255,255,.1);border-radius:10px;padding:14px;font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;cursor:pointer}
.ad{display:flex;align-items:center;gap:12px;width:100%;max-width:320px;margin:20px 0}
.ad span{flex:1;height:.5px;background:rgba(255,255,255,.07)}
.ad small{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px}
.auth .hint{font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.5px;text-align:center;line-height:1.6;margin-top:8px}
.auth .label{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;text-align:left;width:100%;max-width:320px;padding-left:4px;margin-bottom:-4px}
.opt{opacity:.5;transition:opacity .3s}
.opt:focus{opacity:1}

/* ---- App Container ---- */
.app-c{background:var(--bg);height:100%}
.hdr{padding:calc(12px + var(--safe-top)) 20px 10px;display:flex;justify-content:space-between;align-items:center;background:var(--bg);z-index:10}
.hdr-logo{font-size:18px;font-weight:500;letter-spacing:3px;color:var(--text)}
.hdr-icons{display:flex;gap:16px}
.hdr-icons svg{width:20px;height:20px;color:var(--text2);cursor:pointer}

/* ---- Categories ---- */
.cats{padding:2px 20px 10px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cats::-webkit-scrollbar{display:none}
.cp{font-size:12px;padding:7px 16px;border-radius:20px;white-space:nowrap;cursor:pointer;transition:all .25s;letter-spacing:.3px;border:.5px solid var(--border);color:var(--text2);background:transparent;flex-shrink:0}
.cp.on{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ---- Vitrin ---- */
.vit{flex:1;overflow-y:auto;padding:4px 16px 16px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.vit::-webkit-scrollbar{display:none}
.vg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ic{border-radius:var(--radius);border:.5px solid var(--border);overflow:hidden;background:var(--card);cursor:pointer;transition:transform .2s}
.ic:active{transform:scale(.97)}
.ic-img{width:100%;aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.ic-img img{width:100%;height:100%;object-fit:cover}
.ic-ph{color:var(--text3);opacity:.35}
.ic-info{padding:10px 12px}
.ic-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-meta{font-size:10px;color:var(--text3);margin-bottom:10px}
.ic-btn{width:100%;background:transparent;border:.5px solid var(--border);border-radius:8px;padding:9px;font-size:11px;color:var(--text);cursor:pointer;letter-spacing:.5px;font-weight:500;transition:all .2s}
.ic-btn:active{background:var(--bg2)}
.ic-btn.done{color:var(--text3);border-color:var(--bg2);cursor:default}

/* ---- Empty ---- */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;text-align:center}
.empty p{font-size:13px;color:var(--text3);line-height:1.8;letter-spacing:.3px}

/* ---- Bottom Nav ---- */
.bnav{padding:8px 16px calc(12px + var(--safe-bottom));display:flex;justify-content:space-around;background:var(--bg);border-top:.5px solid var(--border);z-index:10}
.nt{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px}
.nt svg{width:20px;height:20px}
.nt span{font-size:9px;letter-spacing:.5px}
.nt.on svg,.nt.on span{color:var(--text)}
.nt:not(.on) svg,.nt:not(.on) span{color:var(--text3)}

/* ---- Devret ---- */
.devret{flex:1;overflow-y:auto;padding:calc(20px + var(--safe-top)) 24px 120px}
.devret h2{font-size:18px;font-weight:500;letter-spacing:1px;margin-bottom:24px;color:var(--text)}
.d-photo{width:100%;aspect-ratio:4/3;border-radius:var(--radius);border:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:20px;background:var(--card);overflow:hidden;position:relative}
.d-photo img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.d-photo svg{color:var(--text3)}
.d-photo span{font-size:11px;color:var(--text3)}
.app-i{width:100%;background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px;font-size:14px;color:var(--text);margin-bottom:12px;transition:border-color .2s}
.app-i:focus{border-color:var(--text3)}
.app-i::placeholder{color:var(--text3)}
.app-s{width:100%;background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px;font-size:14px;color:var(--text);margin-bottom:12px;appearance:none;-webkit-appearance:none}
.app-btn{width:100%;background:var(--text);color:var(--bg);border-radius:10px;padding:15px;font-size:13px;font-weight:500;letter-spacing:.5px;cursor:pointer;margin-top:8px}
.app-btn:active{opacity:.9;transform:scale(.98)}
.app-btn:disabled{opacity:.4;cursor:default;transform:none}

/* ---- Messages ---- */
.ml{flex:1;overflow-y:auto;padding:0 20px;-webkit-overflow-scrolling:touch}
.ml::-webkit-scrollbar{display:none}
.mi{display:flex;gap:12px;padding:16px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.mi:active{opacity:.7}
.mav{width:40px;height:40px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--text2);flex-shrink:0}
.mc{flex:1;min-width:0}
.mc-n{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.mc-p{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-t{font-size:10px;color:var(--text3);margin-top:2px}
.mbadge{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px}

/* ---- Chat ---- */
.ch-hdr{padding:calc(12px + var(--safe-top)) 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:.5px solid var(--border);background:var(--bg)}
.ch-back{cursor:pointer;padding:4px}
.ch-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.ch-msgs::-webkit-scrollbar{display:none}
.bbl{max-width:80%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.5}
.bbl.s{align-self:flex-end;background:var(--text);color:var(--bg);border-bottom-right-radius:4px}
.bbl.r{align-self:flex-start;background:var(--card);border:.5px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
.bbl .bbl-t{font-size:9px;color:var(--text3);margin-top:4px}
.ch-bar{padding:12px 16px calc(12px + var(--safe-bottom));display:flex;gap:10px;border-top:.5px solid var(--border);background:var(--bg)}
.ch-in{flex:1;background:var(--card);border:.5px solid var(--border);border-radius:20px;padding:10px 16px;font-size:13px;color:var(--text)}
.ch-in::placeholder{color:var(--text3)}
.ch-send{width:36px;height:36px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

/* ---- Detail ---- */
.det{background:var(--bg);overflow-y:auto}
.det-img{width:100%;aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.det-img img{width:100%;height:100%;object-fit:cover}
.det-bk{position:absolute;top:calc(12px + var(--safe-top));left:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;cursor:pointer}
.det-body{padding:20px 24px calc(24px + var(--safe-bottom))}
.det-body h2{font-size:20px;font-weight:500;color:var(--text);margin-bottom:6px}
.det-body .meta{font-size:12px;color:var(--text3);margin-bottom:16px}
.det-body .desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px}
.det-owner{display:flex;align-items:center;gap:12px;padding:16px 0;border-top:.5px solid var(--border);margin-bottom:24px}
.det-btn{width:100%;background:var(--text);color:var(--bg);border-radius:12px;padding:16px;font-size:14px;font-weight:500;letter-spacing:.5px;cursor:pointer;text-align:center}
.det-btn:active{opacity:.9}
.det-btn.done{background:var(--bg2);color:var(--text3);cursor:default}

/* ---- Profile ---- */
.prof{flex:1;overflow-y:auto;padding-top:calc(var(--safe-top) + 12px)}
.prof-hdr{text-align:center;padding:20px}
.prof-av{width:64px;height:64px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--text2);margin:0 auto 12px}
.prof-n{font-size:18px;font-weight:500;color:var(--text);letter-spacing:.5px}
.prof-l{font-size:12px;color:var(--text3);margin-top:4px}
.prof-stats{display:flex;justify-content:center;gap:32px;margin-top:20px}
.ps-i{text-align:center}
.ps-n{font-size:20px;font-weight:500;color:var(--text)}
.ps-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.5px}
.prof-menu{padding:0 20px}
.pm-i{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.pm-i span{font-size:14px;color:var(--text)}
.pm-i svg{color:var(--text3);width:16px;height:16px}

/* ---- Search ---- */
.search-ov{position:absolute;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s}
.search-ov.on{opacity:1;pointer-events:all}
.s-bar{padding:calc(12px + var(--safe-top)) 16px 12px;display:flex;gap:12px;align-items:center}
.s-in{flex:1;background:var(--bg2);border:none;border-radius:10px;padding:12px 16px;font-size:14px;color:var(--text)}
.s-in::placeholder{color:var(--text3)}
.s-cancel{font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap}

/* ---- Admin ---- */
.admin-badge{display:inline-block;background:var(--accent);color:var(--black);font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:.5px;margin-left:8px;vertical-align:middle}
.pending-dot{width:6px;height:6px;border-radius:50%;background:#E24B4A;display:inline-block;margin-left:6px}

/* ---- Toast ---- */
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:12px 24px;border-radius:20px;font-size:12px;letter-spacing:.5px;opacity:0;transition:all .4s ease;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Loading ---- */
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:40px}

/* ---- Animations ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .5s ease forwards}
.d1{animation-delay:.1s;opacity:0}
.d2{animation-delay:.2s;opacity:0}
.d3{animation-delay:.3s;opacity:0}
.d4{animation-delay:.4s;opacity:0}
</style>
</head>
<body>

<script>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobGRlcWx4eWl6dXF4cnFranp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDYzOTgsImV4cCI6MjA4OTkyMjM5OH0.X65chXvc7wuRV-twnTM-X_BN-yeQ5EwYC7I-TKS8vyM';

let sb;
try {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  console.warn('Supabase init failed, running in demo mode', e);
}

// ============================================
// MICRO MESSAGES
// ============================================
const MM = {
  gone: ["Bu eşya yeni bir hayata geçti.","Sahibini buldu, yola çıktı.","Bir kapı kapandı, bir yuva açıldı.","Bu eşyanın hikâyesi devam ediyor.","Devredildi. Güle güle kullansın."],
  accepted: ["Seninle buluşuyor.","Yolda sana doğru.","Yeni sahibi sen oluyorsun.","Bu eşya artık seninle.","Kavuşma yakın."],
  emptyV: ["Şu an dolaşımda bir şey yok.","Vitrin dinleniyor. Yakında yeni eşyalar gelir.","Sessizlik de güzeldir. Birazdan bakalım.","Henüz hiçbir şey devredilmedi.","Beklemedeyiz. Güzel şeyler yolda."],
  emptyM: ["Henüz bir konuşma yok.","Sessizlik. Bir eşya talep et, sohbet başlasın.","Mesaj kutusu boş. Güzel bir devir seni bekliyor."],
  welcome: ["Hoş geldin. Eşyalar seni bekliyordu.","İçeri buyur. Vitrin hazır.","Aramıza hoş geldin."],
  requested: ["Talebin iletildi.","Eşya sahibine haber verdik.","Sırada senin talebin var."],
};
const rm = k => { const a=MM[k]; return a[Math.floor(Math.random()*a.length)]; };

// ============================================
// CATEGORIES
// ============================================
const CATS = ["tümü","ev","elektronik","çocuk","spor","kitap","giyim","diğer"];

// ============================================
// STATE
// ============================================
let S = {
  screen:'invite', tab:'vitrin', user:null,
  cat:'tümü', searchOpen:false, searchQ:'',
  selItem:null, selChat:null,
  items:[], myRequests:new Set(),
  conversations:[], messages:[],
  pendingItems:[], // admin
  photoFile:null, photoPreview:null,
};

// ============================================
// LOCAL STORAGE HELPERS
// ============================================
function saveUser(u){
  if(u) localStorage.setItem('vesta_user',JSON.stringify(u));
  else localStorage.removeItem('vesta_user');
}
function loadUser(){
  try{ return JSON.parse(localStorage.getItem('vesta_user')); }catch{return null;}
}

// ============================================
// SUPABASE HELPERS
// ============================================
async function dbCheckInvite(code){
  if(!sb) return {valid:true}; // demo mode
  const {data,error} = await sb.from('invite_codes').select('*').eq('code',code.toUpperCase()).eq('used',false).single();
  if(error||!data) return {valid:false};
  return {valid:true, id:data.id};
}

async function dbUseInvite(id, userId){
  if(!sb) return;
  await sb.from('invite_codes').update({used:true, used_by:userId, used_at:new Date().toISOString()}).eq('id',id);
}

async function dbCreateUser(u){
  if(!sb) return {...u, id:'demo-'+Date.now()};
  const {data,error} = await sb.from('users').insert({
    name:u.name, location:u.location, phone:u.phone,
    email:u.email||null, password_hash:u.password||null,
    has_password:!!u.password
  }).select().single();
  if(error){ console.error(error); return null; }
  return data;
}

async function dbLogin(phone, password){
  if(!sb) return {id:'demo',name:'Demo',location:'Kadıköy',phone,is_admin:false};
  let q = sb.from('users').select('*').eq('phone',phone);
  if(password) q = q.eq('password_hash',password);
  const {data,error} = await q.single();
  if(error||!data) return null;
  if(password && data.password_hash !== password) return null;
  return data;
}

async function dbGetItems(){
  if(!sb) return [];
  const {data} = await sb.from('items').select('*, owner:users(name,location)').eq('status','active').order('created_at',{ascending:false}).limit(30);
  return data||[];
}

async function dbGetPending(){
  if(!sb) return [];
  const {data} = await sb.from('items').select('*, owner:users(name)').eq('status','pending').order('created_at',{ascending:false});
  return data||[];
}

async function dbCreateItem(item){
  if(!sb) return null;
  const {data,error} = await sb.from('items').insert(item).select().single();
  if(error) console.error(error);
  return data;
}

async function dbApproveItem(id){
  if(!sb) return;
  await sb.from('items').update({status:'active',approved_at:new Date().toISOString()}).eq('id',id);
}

async function dbRejectItem(id){
  if(!sb) return;
  await sb.from('items').update({status:'expired'}).eq('id',id);
}

async function dbCreateRequest(itemId, requesterId){
  if(!sb) return null;
  const {data,error} = await sb.from('requests').insert({item_id:itemId, requester_id:requesterId}).select().single();
  if(error) console.error(error);
  return data;
}

async function dbGetMyRequests(userId){
  if(!sb) return [];
  const {data} = await sb.from('requests').select('item_id').eq('requester_id',userId);
  return (data||[]).map(r=>r.item_id);
}

async function dbGetConversations(userId){
  if(!sb) return [];
  const {data} = await sb.from('conversations')
    .select('*, item:items(name), p1:users!conversations_participant_1_fkey(name), p2:users!conversations_participant_2_fkey(name), messages(content,created_at,sender_id,read)')
    .or(`participant_1.eq.${userId},participant_2.eq.${userId}`)
    .order('created_at',{ascending:false});
  return data||[];
}

async function dbGetOrCreateConversation(itemId, p1, p2){
  if(!sb) return {id:'demo-conv'};
  // Check existing
  const {data:existing} = await sb.from('conversations')
    .select('*').eq('item_id',itemId)
    .or(`and(participant_1.eq.${p1},participant_2.eq.${p2}),and(participant_1.eq.${p2},participant_2.eq.${p1})`)
    .single();
  if(existing) return existing;
  const {data,error} = await sb.from('conversations').insert({item_id:itemId,participant_1:p1,participant_2:p2}).select().single();
  if(error) console.error(error);
  return data;
}

async function dbGetMessages(convId){
  if(!sb) return [];
  const {data} = await sb.from('messages').select('*').eq('conversation_id',convId).order('created_at',{ascending:true});
  return data||[];
}

async function dbSendMessage(convId, senderId, content){
  if(!sb) return null;
  const {data,error} = await sb.from('messages').insert({conversation_id:convId,sender_id:senderId,content}).select().single();
  if(error) console.error(error);
  return data;
}

async function dbUploadPhoto(file){
  if(!sb) return null;
  const ext = file.name.split('.').pop();
  const path = `items/${Date.now()}.${ext}`;
  const {data,error} = await sb.storage.from('photos').upload(path, file);
  if(error){ console.error(error); return null; }
  const {data:urlData} = sb.storage.from('photos').getPublicUrl(path);
  return urlData?.publicUrl || null;
}

async function dbGetUserStats(userId){
  if(!sb) return {given:0,received:0};
  const {data:u} = await sb.from('users').select('items_given,items_received').eq('id',userId).single();
  return u ? {given:u.items_given, received:u.items_received} : {given:0,received:0};
}

// Admin: create invite codes
async function dbCreateInviteCodes(codes, createdBy){
  if(!sb) return;
  const rows = codes.map(c=>({code:c.toUpperCase(), created_by:createdBy}));
  const {error} = await sb.from('invite_codes').insert(rows);
  if(error) console.error(error);
}

async function dbGetInviteCodes(){
  if(!sb) return [];
  const {data} = await sb.from('invite_codes').select('*, used_user:users!invite_codes_used_by_fkey(name)').order('created_at',{ascending:false});
  return data||[];
}

// ============================================
// REALTIME
// ============================================
function setupRealtime(){
  if(!sb || !S.user) return;
  sb.channel('vesta-messages')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'}, payload => {
      if(S.selChat && S.messages){
        const msg = payload.new;
        if(!S.messages.find(m=>m.id===msg.id)){
          S.messages.push(msg);
          renderChatMessages();
          scrollChat();
        }
      }
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'items'}, () => {
      loadItems();
    })
    .subscribe();
}

// ============================================
// DATA LOADERS
// ============================================
async function loadItems(){
  S.items = await dbGetItems();
  if(S.screen==='app' && S.tab==='vitrin' && !S.selItem && !S.selChat) render();
}

async function loadMyRequests(){
  if(!S.user) return;
  const ids = await dbGetMyRequests(S.user.id);
  S.myRequests = new Set(ids);
}

async function loadConversations(){
  if(!S.user) return;
  S.conversations = await dbGetConversations(S.user.id);
}

async function loadPending(){
  if(!S.user?.is_admin) return;
  S.pendingItems = await dbGetPending();
}

function toast(msg){
  setTimeout(()=>{const t=document.getElementById('toast');if(t){t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}},50);
}

// ============================================
// EVENT BINDING
// ============================================
function bind(){
  // Invite
  q('#xInvite','click',async()=>{
    const code=v('#xCode');
    if(code.length<4) return toast('geçerli bir davet kodu gir');
    const btn=document.getElementById('xInvite');
    btn.disabled=true; btn.textContent='kontrol ediliyor...';
    const r=await dbCheckInvite(code);
    if(r.valid){
      S._inviteId=r.id;
      S.screen='signup'; R();
    } else {
      toast('geçersiz veya kullanılmış kod');
      btn.disabled=false; btn.textContent='devam et';
    }
  });
  q('#xGoLogin','click',()=>{S.screen='login';R();});

  // Signup
  q('#xSignup','click',async()=>{
    const name=v('#xName'),loc=v('#xLoc'),phone=v('#xPhone'),email=v('#xEmail'),pass=v('#xPass');
    if(!name||!loc||!phone) return toast('zorunlu alanları doldur');
    const btn=document.getElementById('xSignup');
    btn.disabled=true; btn.textContent='kaydediliyor...';
    const user=await dbCreateUser({name,location:loc,phone,email,password:pass});
    if(!user){toast('kayıt başarısız — telefon zaten kayıtlı olabilir');btn.disabled=false;btn.textContent='topluluğa katıl';return;}
    if(S._inviteId) await dbUseInvite(S._inviteId, user.id);
    S.user=user; saveUser(user);
    S.screen='app'; await initApp(); R();
    toast(rm('welcome'));
  });

  // Login
  q('#xLogin','click',async()=>{
    const phone=v('#xLPhone'),pass=v('#xLPass');
    if(!phone) return toast('telefonunu gir');
    const btn=document.getElementById('xLogin');
    btn.disabled=true; btn.textContent='giriş yapılıyor...';
    const user=await dbLogin(phone,pass);
    if(!user){toast('kullanıcı bulunamadı veya şifre hatalı');btn.disabled=false;btn.textContent='giriş yap';return;}
    S.user=user; saveUser(user);
    S.screen='app'; await initApp(); R();
    toast(rm('welcome'));
  });
  q('#xSmsLogin','click',()=>toast('sms doğrulama yakında aktif'));
  q('#xBackInv','click',()=>{S.screen='invite';R();});

  // Opt field focus
  document.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('focus',()=>el.style.opacity='1');
    el.addEventListener('blur',()=>{if(!el.value)el.style.opacity='.5';});
  });

  // Nav
  document.querySelectorAll('.nt[data-tab]').forEach(t=>t.addEventListener('click',async()=>{
    S.tab=t.dataset.tab; S.selItem=null; S.selChat=null;
    if(S.tab==='mesajlar') await loadConversations();
    if(S.tab==='ben' && S.user?.is_admin) await loadPending();
    R();
  }));

  // Categories
  document.querySelectorAll('.cp').forEach(p=>p.addEventListener('click',()=>{S.cat=p.dataset.cat;R();}));

  // Item cards
  document.querySelectorAll('.ic[data-item]').forEach(c=>c.addEventListener('click',e=>{
    if(e.target.closest('.ic-btn')) return;
    S.selItem=c.dataset.item; R();
  }));

  // Request buttons
  document.querySelectorAll('[data-req]').forEach(b=>b.addEventListener('click',async e=>{
    e.stopPropagation();
    const id=b.dataset.req;
    if(S.myRequests.has(id)) return;
    S.myRequests.add(id);
    const item=S.items.find(i=>i.id===id);
    if(item && S.user) await dbCreateRequest(id, S.user.id);
    R(); toast(rm('requested'));
    // Create conversation with owner
    if(item && S.user && item.owner_id !== S.user.id){
      await dbGetOrCreateConversation(id, S.user.id, item.owner_id);
    }
  }));

  // Detail
  q('#xDetBack','click',()=>{S.selItem=null;R();});
  q('#xDetReq','click',async()=>{
    const id=document.getElementById('xDetReq')?.dataset.id;
    if(!id||S.myRequests.has(id)) return;
    S.myRequests.add(id);
    const item=S.items.find(i=>i.id===id);
    if(item && S.user) await dbCreateRequest(id, S.user.id);
    R(); toast(rm('requested'));
    if(item && S.user && item.owner_id !== S.user.id){
      await dbGetOrCreateConversation(id, S.user.id, item.owner_id);
    }
  });

  // Search
  q('#xSearch','click',()=>{S.searchOpen=true;R();setTimeout(()=>document.getElementById('searchIn')?.focus(),100);});
  q('#xSearchCancel','click',()=>{S.searchOpen=false;S.searchQ='';R();});
  const si=document.getElementById('searchIn');
  if(si) si.addEventListener('input',e=>{S.searchQ=e.target.value;R();setTimeout(()=>document.getElementById('searchIn')?.focus(),10);});

  // Messages
  document.querySelectorAll('.mi[data-chat]').forEach(m=>m.addEventListener('click',async()=>{
    S.selChat=m.dataset.chat;
    S.messages=await dbGetMessages(S.selChat);
    R(); scrollChat();
  }));

  // Chat
  q('#xChatBack','click',()=>{S.selChat=null;S.messages=[];R();});
  q('#xSend','click',sendMsg);
  const ci=document.getElementById('chatIn');
  if(ci) ci.addEventListener('keypress',e=>{if(e.key==='Enter')sendMsg();});

  // Devret
  q('#xPhotoBox','click',()=>document.getElementById('xPhotoIn')?.click());
  const pi=document.getElementById('xPhotoIn');
  if(pi) pi.addEventListener('change',e=>{
    const f=e.target.files[0];
    if(f){S.photoFile=f;S.photoPreview=URL.createObjectURL(f);R();}
  });
  q('#xDevret','click',async()=>{
    const name=v('#xItemName'),cat=document.getElementById('xItemCat')?.value,note=v('#xItemNote');
    if(!name||!cat) return toast('eşya adı ve kategori gerekli');
    const btn=document.getElementById('xDevret');
    btn.disabled=true; btn.textContent='gönderiliyor...';
    let photoUrl=null;
    if(S.photoFile) photoUrl=await dbUploadPhoto(S.photoFile);
    await dbCreateItem({name,description:note,category:cat,location:S.user?.location||'',photo_url:photoUrl,owner_id:S.user?.id,status:'pending'});
    S.photoFile=null;S.photoPreview=null;
    toast('ilanın onaya gönderildi');
    setTimeout(()=>{S.tab='vitrin';R();},1200);
  });

  // Profile
  q('#xLogout','click',()=>{
    S.user=null;S.screen='invite';S.tab='vitrin';S.selItem=null;S.selChat=null;S.myRequests.clear();
    S.items=[];S.conversations=[];S.messages=[];S.pendingItems=[];
    saveUser(null); R();
  });

  // Admin
  q('#xAdmin','click',async()=>{S.tab='admin';await loadPending();R();loadAdminCodes();});
  q('#xAdminBack','click',()=>{S.tab='ben';R();});
  q('#xAddCode','click',async()=>{
    const code=v('#xNewCode');
    if(!code) return toast('kod gir');
    await dbCreateInviteCodes([code], S.user?.id);
    toast('kod oluşturuldu: '+code.toUpperCase());
    document.getElementById('xNewCode').value='';
    loadAdminCodes();
  });

  // Approve/Reject
  document.querySelectorAll('[data-approve]').forEach(b=>b.addEventListener('click',async()=>{
    await dbApproveItem(b.dataset.approve);
    toast('ilan onaylandı');
    await loadPending(); await loadItems(); R();
    if(S.tab==='admin') loadAdminCodes();
  }));
  document.querySelectorAll('[data-reject]').forEach(b=>b.addEventListener('click',async()=>{
    await dbRejectItem(b.dataset.reject);
    toast('ilan reddedildi');
    await loadPending(); R();
  }));
}

async function sendMsg(){
  const ci=document.getElementById('chatIn');
  if(!ci||!ci.value.trim()||!S.selChat||!S.user) return;
  const content=ci.value.trim();
  ci.value='';
  const msg=await dbSendMessage(S.selChat, S.user.id, content);
  if(msg && !S.messages.find(m=>m.id===msg.id)){
    S.messages.push(msg);
    renderChatMessages();
    scrollChat();
  }
}

async function loadAdminCodes(){
  const el=document.getElementById('codeList');
  if(!el) return;
  const codes=await dbGetInviteCodes();
  if(!codes.length){el.innerHTML='<div style="font-size:12px;color:var(--text3)">henüz kod oluşturulmadı</div>';return;}
  el.innerHTML=codes.map(c=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid var(--border)">
      <div>
        <div style="font-size:13px;font-weight:500;letter-spacing:1px;color:var(--text)">${c.code}</div>
        <div style="font-size:10px;color:var(--text3)">${c.used?`kullanıldı — ${c.used_user?.name||'?'}`:'aktif'}</div>
      </div>
      <div style="width:8px;height:8px;border-radius:50%;background:${c.used?'var(--text3)':'#1D9E75'}"></div>
    </div>
  `).join('');
}

// ============================================
// HELPERS
// ============================================
function q(sel,evt,fn){const el=document.querySelector(sel);if(el)el.addEventListener(evt,fn);}
function v(sel){const el=document.querySelector(sel);return el?el.value.trim():'';}

// ============================================
// INIT
// ============================================
async function initApp(){
  await loadItems();
  await loadMyRequests();
  await loadConversations();
  if(S.user?.is_admin) await loadPending();
  setupRealtime();
}

(async()=>{
  const saved=loadUser();
  if(saved){
    S.user=saved;
    S.screen='app';
    R();
    await initApp();
    R();
  } else {
    R();
  }
})();
</script>
</body>
</html>
